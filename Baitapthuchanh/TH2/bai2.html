<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link
href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500&display=swap"
rel="stylesheet"
/>

<title>Travel Goals</title>

<style>


* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Quicksand", sans-serif;
}

header {
  position: absolute;
  width: 100%;
  padding: 10px 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}

#page-logo a {
  font-family: "Oleo Script", cursive;
  font-size: 28px;
  text-decoration: none;
  color: #f5ebb3;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 25px;
}

nav a {
  text-decoration: none;
  color: white;
  font-weight: 500;
}

nav a:hover {
  color: #ffd900;
}


#hero {
  height: 90vh;
  background: url("extra-files/ocean.jpg")
    center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

#hero-content {
  background: rgba(0, 0, 0, 0.6);
  padding: 40px 60px;
  text-align: center;
  color: white;
  border-radius: 8px;
}

#hero-content h1 {
  font-family: "Raleway", sans-serif;
  font-size: 40px;
  margin-bottom: 10px;
}

#hero-content a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 25px;
  background: #ffd900;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 4px;
}

#hero-content a:hover {
  background: #ffcc00;
}


#highlights {
  background: #dff4fa;
  padding: 60px 40px;
  text-align: center;
}

#highlights h2 {
  margin-bottom: 40px;
  font-size: 28px;
}

#destinations {
  list-style: none;
  display: flex;
  justify-content: center;
  gap: 25px;
}

.destination {
  width: 300px;
  background: white;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.destination img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.destination p {
  padding: 15px;
  font-weight: 500;
}

/* ===== FOOTER ===== */
footer {
  background: #111;
  padding: 25px;
}

footer ul {
  list-style: none;
  display: flex;
  justify-content: center;
  gap: 40px;
}

footer img {
  width: 35px;
  height: 35px;
}
.destination a {
  text-decoration: none;
  color: inherit;
  display: block;
}
</style>
</head>

<body>

<header>
  <div id="page-logo">
    <a href="#">Travel Goals</a>
  </div>
  <nav>
    <ul>
      <li><a href="#">Destinations</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>
</header>

<main>
  <section id="hero">
    <div id="hero-content">
      <h1>Joe's Travel Page</h1>
      <p>Let's explore the world together!</p>
      <a href="#">Discover places</a>
    </div>
  </section>

  <section id="highlights">
    <h2>Highlights</h2>
    <ul id="destinations">
      <li class="destination">
        <a href="https://en.wikipedia.org/wiki/Miami" target="_blank">
        <img src="extra-files/cities/miami.jpg" alt ="" />
        <p>Miami <strong>USA</strong></p>
        </a>
      </li>
      <li class="destination">
        <a href="https://en.wikipedia.org/wiki/Munich" target="_blank">
        <img src="extra-files/cities/munich.jpg "alt ="" />
        <p>Munich <strong>Germany</strong></p>
        </a>
      </li>
      <li class="destination">
        <a href="https://en.wikipedia.org/wiki/Barcelona" target="_blank">
        <img src="extra-files/cities/barcelona.jpg" />
        <p>Barcelona <strong>Spain</strong></p>
        </a>
      </li>
    </ul>
  </section>
</main>

<footer>
  <ul>
    <li>
      <a href="#"><img src="extra-files/icons/insta.png" /></a>
    </li>
    <li>
      <a href="#"><img src="extra-files/icons/facebook.png" /></a>
    </li>
  </ul>
</footer>

</body>
</html>
