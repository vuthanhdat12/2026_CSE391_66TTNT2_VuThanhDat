<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		body{
			font-family: Arial, sans-serif;
			background: #f2f2f2;
		}
		.title{
			background-color: #8cc6d8;
			padding:8px;

			gap:20px;

		}
		.row input,
		.row textarea{
			flex :1;
			padding:12px;
			border :1px solid #ccc;

		}
		textarea{

			resize:none;
		}
		.bottom{
			justify-content:space-between;
			align-items:center;
		}
		button{
			background:#6fb3d2;
			color :while;
			padding:10px 20px;
			border:none;
			cursor:pointer;
		}
		button:hover{
			opacity:0.9;
		}
		.bottom p{
			color:#777;
			font: size 14px;

		}

	</style>
</head>
<body>

	<div class = "container">
		<h2>Get in touch with us by filling contact form blow</h2>
		<form>
			<div class="row">
				<input type = "text" placeholder ="*Enter yout full name">
				<input type = "email" placeholder = "*Enter your Email address">

			</div>
			<div class ="row">
				<input type = "text" placeholder = "*Enter your subject ">

			</div>
			<div class = "row">
				<textarea placeholder = "* Your message here... "></textarea>
			</div>

				<p>* Please fill all required form field, thank!</p>

			</div>

	      
		</form>
	</div>
	
</body>
</html>
