<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản Lý Điểm Sinh Viên</title>
<link rel="stylesheet" href="diemsv.css">
</head>

<body>

<h2>Quản Lý Điểm Sinh Viên</h2>

<div class="input-area">
<input id="name" placeholder="Họ tên">
<input id="score" type="number" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>
</div>

<div class="filter-area">
<input id="search" placeholder="Tìm kiếm tên...">

<select id="filterRank">
<option value="all">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>
</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="sortScore">Điểm ▲▼</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<p id="noResult">Không có kết quả</p>

<div id="stats">
Tổng SV: 0 | Điểm TB: 0
</div>

<script src="diemsv.js"></script>

</body>
</html>
